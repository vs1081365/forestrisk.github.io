      color: var(--text);

</head>

            'Git repository: clean history, tagged v1.0.0 release',
            '20-minute presentation: architecture, results, lessons learned',
            'Live demo: sensor data → real-time alerts → BI dashboards',
            'Video recording: 5-minute overview of system',
            'Runbook: startup, daily ops, scaling procedures, emergency contacts'
          ],
          tools: ['Git', 'Presentation Tools', 'Recording Software'],
          tags: ['architecture'],
          outcome: 'Demonstrate mastery of full-stack big data systems'
        }
      ]
    }
  ]
};

function generateTimeline() {
  const container = document.getElementById('timeline');
  let totalTasks = 0;

  projectData.phases.forEach(phase => {
    totalTasks += phase.tasks.length;
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';

    const tasksHtml = phase.tasks.map((task, idx) => `
      <div class="task-item collapsed" onclick="this.classList.toggle('collapsed')">
        <div class="task-head">
          <div class="task-check" onclick="event.stopPropagation(); toggleCheck(this)">☐</div>
          <div class="task-content">
            <div class="task-title">
              ${task.title}
              <span class="expand-icon">▼</span>
            </div>
            <div class="task-desc">${task.desc}</div>
            <div class="task-meta">
              <span class="task-meta-item">📅 ${phase.badge}</span>
              <span class="task-meta-item">🎯 ${phase.focus}</span>
            </div>
            <div class="tags">
              ${task.tags.map(tag => `<span class="tag ${tag}">${tag.toUpperCase()}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="task-details">
          <div class="detail-section">
            <div class="detail-label">📚 Key Concepts</div>
            <ul class="detail-list">
              ${task.concepts.map(c => `<li>${c}</li>`).join('')}
            </ul>
          </div>
          <div class="detail-section">
            <div class="detail-label">📦 What You'll Build</div>
            <ul class="detail-list">
              ${task.deliverables.map(d => `<li>${d}</li>`).join('')}
            </ul>
          </div>
          <div class="detail-section">
            <div class="detail-label">🛠️ Tools & Technologies</div>
            <div class="detail-content">${task.tools.join(' · ')}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">💡 Learning Outcome</div>
            <div class="detail-content">${task.outcome}</div>
          </div>
        </div>
      </div>
    `).join('');

    phaseEl.innerHTML = `
      <div class="phase-header">
        <div>
          <div class="phase-title">${phase.title}</div>
          <span class="phase-badge">${phase.badge} · ${phase.duration}</span>
        </div>
      </div>
      <div class="phase-meta">
        <div class="phase-meta-item">📍 <strong>Focus:</strong> ${phase.focus}</div>
        <div class="phase-meta-item">📊 <strong>Tasks:</strong> ${phase.tasks.length}</div>
        <div class="phase-meta-item">⏱️ <strong>Duration:</strong> ${phase.duration}</div>
      </div>
      <div class="phase-objective">🎓 ${phase.objective}</div>
      <div class="tasks">
        ${tasksHtml}
      </div>
    `;

    container.appendChild(phaseEl);
  });

  document.getElementById('total-tasks').textContent = totalTasks;

  // Task checking
  document.querySelectorAll('.task-check').forEach(checkbox => {
    checkbox.addEventListener('click', (e) => {
      e.stopPropagation();
      checkbox.classList.toggle('checked');
      checkbox.textContent = checkbox.classList.contains('checked') ? '✓' : '☐';
      const card = checkbox.closest('.task-item');
      if (checkbox.classList.contains('checked')) {
        card.style.opacity = '0.6';
      } else {
        card.style.opacity = '1';
      }
    });
  });
}

function toggleCheck(elem) {
  elem.classList.toggle('checked');
  elem.textContent = elem.classList.contains('checked') ? '✓' : '☐';
  const card = elem.closest('.task-item');
  card.style.opacity = elem.classList.contains('checked') ? '0.6' : '1';
}

document.addEventListener('DOMContentLoaded', generateTimeline);
</script>

</body>
</html>
